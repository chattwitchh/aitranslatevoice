<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Subtitles</title>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #subtitle-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-bottom: 20px;
        }

        #text {
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 
                         -2px -2px 4px rgba(0, 0, 0, 0.8), 
                         2px -2px 4px rgba(0, 0, 0, 0.8), 
                         -2px 2px 4px rgba(0, 0, 0, 0.8);
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 80%;
            min-height: 40px;
            /* Плавное появление текста */
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
        }

        .visible {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

<div id="subtitle-container">
    <div id="text">Начните говорить...</div>
</div>

<script>
    const textElement = document.getElementById('text');
    let recognition;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ru-RU';

        recognition.onresult = async (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            const query = finalTranscript || interimTranscript;
            if (query.length > 2) {
                const translated = await translateText(query);
                showSubtitles(translated);
            }
        };

        recognition.onerror = (event) => console.error("Speech error:", event.error);
        recognition.onend = () => recognition.start(); // Перезапуск при остановке

        recognition.start();
    } else {
        textElement.innerText = "Speech API не поддерживается в этом браузере";
    }

    async function translateText(text) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encodeURI(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            return data[0][0][0];
        } catch (e) {
            return text; // Если ошибка, вернет оригинал
        }
    }

    let timeout;
    function showSubtitles(content) {
        textElement.innerText = content;
        textElement.classList.add('visible');

        // Очистка предыдущего таймера, чтобы текст не исчезал слишком быстро
        clearTimeout(timeout);
        // Субтитры висят 4 секунды (настройте под себя)
        timeout = setTimeout(() => {
            textElement.classList.remove('visible');
        }, 4000);
    }
</script>

</body>
</html>
